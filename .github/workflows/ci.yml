# SPDX-License-Identifier: MIT
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v4
      - name: Install Eigen
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
      - name: Build
        run: cmake --build build -j $(nproc)
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Check example documentation is current
        if: matrix.compiler == 'g++'
        run: python3 docs/generate_examples.py --build-dir build --check

  pip-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No apt Eigen on purpose: exercises the FetchContent fallbacks (ellipsoid_tree,
      # and Eigen inside ellipsoid_tree) within a pip build.
      - name: Build wheel
        run: python3 -m pip wheel . --no-deps -w dist
      - name: Install and test
        run: |
          python3 -m pip install numpy scipy pytest dist/*.whl
          python3 -m pytest bindings/tests -q

  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libeigen3-dev python3-dev
          python3 -m pip install numpy scipy pytest
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DELLIPSOID_PSF_BUILD_PYTHON=ON
          -DELLIPSOID_PSF_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build -j $(nproc) --target ellipsoid_psf_python
      - name: Test
        run: PYTHONPATH=build/bindings python3 -m pytest bindings/tests -q

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [thread, "address,undefined"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Eigen
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer"
      - name: Build
        # Sanitizer TUs are the most memory-hungry; cap harder to avoid OOM on the runner.
        run: cmake --build build -j 2
      - name: Test
        run: ctest --test-dir build --output-on-failure

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ellipsoid_psf.hpp version matches pyproject.toml
        run: |
          python3 - <<'PY'
          import re, sys, tomllib
          hpp = open("include/ellipsoid_psf/ellipsoid_psf.hpp").read()
          def macro(tag): return re.search(rf"ELLIPSOID_PSF_VERSION_{tag} (\d+)", hpp).group(1)
          header = f"{macro('MAJOR')}.{macro('MINOR')}.{macro('PATCH')}"
          pyproj = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          print(f"ellipsoid_psf.hpp={header}  pyproject.toml={pyproj}")
          if pyproj != header:
              sys.exit(f"version mismatch: ellipsoid_psf.hpp={header}, pyproject.toml={pyproj}")
          print("versions consistent")
          PY
